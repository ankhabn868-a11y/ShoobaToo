<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lecture 7</title>

</head>

<body>

<button id="btn">Дараах</button>

<h1 id="shooToo">1</h1>

<img id="shooZurag" src="shoo1.png" />
<br>
<a href="lab7.2.html">2 дахь page руу орох</a>
<script>

let zurag = document.getElementById("shooZurag");
let btn = document.getElementById("btn");
let too = document.getElementById("shooToo");

let sum = Number(localStorage.getItem("nemeh")) || 0;
too.innerHTML = sum;

let count = 0;

btn.addEventListener("click", function () {

    if (count < 6) {

        let randomToo = Math.floor(Math.random() * 6) + 1;

        sum += randomToo;

        zurag.src = "shoo" + randomToo + ".png";

        too.innerHTML = sum;

        localStorage.setItem("nemeh", sum);

        count++;

        if (count == 5) {
            btn.style.display = "none";
        }

    }

});

</script>

</body>
</html>
