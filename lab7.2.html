<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random number</title>
</head>

<body>

<button onclick="random()">Санамсаргүй тоо</button>

<h2 id="result"></h2>

<input type="text" id="check">

<button onclick="shalga()">Шалгах</button>
<Br>
    <br>
<button onclick="add(0)">0</button>
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>
<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>
<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>
<button onclick="clearInput()">clear</button>
<Br>
    <br>
<a href="index.html">1 дахь page руу орох</a>
<script>

let num = 0;

function random() {

    num = Math.floor(Math.random() * (20000 - 10000 + 1)) + 10000;

    document.getElementById("result").innerHTML = num;

    setTimeout(function () {

        document.getElementById("result").innerHTML = "";

    }, 5000);

}

function shalga() {

    if (Number(document.getElementById("check").value) == num) {

        alert("Зөв байна.");

        document.getElementById("check").value = "";

    } else {

        alert("Буруу тоо байна " + num);

        document.getElementById("check").value = "";

    }

}
function add(n) {
    document.getElementById("check").value += n;
}
function clearInput() {
    document.getElementById("check").value = "";
}
</script>

</body>
</html>
